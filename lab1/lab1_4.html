<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Простые числа</title>
</head>
<body>
    <h1>Поиск простых чисел</h1>
    <label for="maxNumber">Введите число n:</label>
    <input type="number" id="maxNumber" min="2" value="10">
    <button id="findBtn">Найти</button>
    <div id="primesResult" style="margin-top: 15px; font-weight: bold;"></div>

    <script>
        'use strict';

        document.getElementById('findBtn').addEventListener('click', function() {
            const n = parseInt(document.getElementById('maxNumber').value);
            const resultDiv = document.getElementById('primesResult');
            
            if (isNaN(n) || n < 2) {
                resultDiv.textContent = 'Пожалуйста, введите число не меньше 2.';
                return;
            }

            const primes = [];

            for (let i = 2; i <= n; i++) {
                let isPrime = true;
                for (let j = 2; j <= Math.sqrt(i); j++) {
                    if (i % j === 0) {
                        isPrime = false;
                        break;
                    }
                }
                if (isPrime) {
                    primes.push(i);
                }
            }

            resultDiv.textContent = `Простые числа от 2 до ${n}: ${primes.join(', ')}`;
        });
    </script>
</body>
</html>
