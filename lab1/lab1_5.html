<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Таблица в консоль</title>
</head>
<body>
    <h2>Генерация таблицы в консоль браузера</h2>
    <label for="rowCount">Количество строк:</label>
    <input type="number" id="rowCount" min="1" value="5">
    <button id="drawBtn">Рисовать</button>
    <p style="color: gray; font-size: 0.9em;">Результат выводится в консоль браузера (F12 -> Console).</p>

    <script>
        'use strict';

        document.getElementById('drawBtn').addEventListener('click', function() {
            const rows = parseInt(document.getElementById('rowCount').value);
            
            if (isNaN(rows) || rows < 1) {
                console.error('Неверное количество строк');
                return;
            }
            const animals = ['dog', 'dog', 'dog', 'cat', 'cat'];
            let globalIndex = 0;

            console.clear();
            console.log(`--- Таблица из ${rows} строк ---`);

            for (let r = 0; r < rows; r++) {
                let rowItems = [];
                
                for (let c = 0; c < 6; c++) {
                    rowItems.push(animals[globalIndex % animals.length]);
                    globalIndex++;
                }
                console.log(rowItems.join('\t'));
            }
        });
    </script>
</body>
</html>
