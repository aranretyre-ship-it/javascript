<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактируемый div</title>
    <style>
        .editable-div {
            width: 300px;
            min-height: 100px;
            border: 1px solid #ccc;
            padding: 10px;
            margin: 20px;
            background: white;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="myDiv" class="editable-div">Это редактируемый текст. Нажмите Ctrl+E для редактирования и CTRL+S для сохранения</div>

    <script>
        'use strict';

        const div = document.getElementById('myDiv');
        let isEditing = false;
        let originalContent = '';
        const savedText = localStorage.getItem('savedDivContent');
        if (savedText) {
            div.innerHTML = savedText; // Если текст был сохранен ранее, заменяем им стандартный текст
        }

        document.addEventListener('keydown', function(e) {
            // Ctrl+E — Редактирование
            if (e.ctrlKey && (e.key === 'e' || e.key === 'у' || e.key === 'E' || e.key === 'У')) {
                e.preventDefault();

                if (!isEditing) {
                    originalContent = div.innerHTML;
                    const textarea = document.createElement('textarea');
                    textarea.value = div.innerHTML;
                    div.innerHTML = '';
                    div.appendChild(textarea);
                    textarea.focus();
                    isEditing = true;
                }
            }
            // Ctrl+S — Сохранение
            else if (e.ctrlKey && (e.key === 's' || e.key === 'ы' || e.key === 'S' || e.key === 'Ы') && isEditing) {
                e.preventDefault();

                const textarea = div.querySelector('textarea');
                const newText = textarea.value;
                div.innerHTML = newText;
                isEditing = false;
                localStorage.setItem('savedDivContent', newText);
            }
            // Escape — Отмена редактирования
            else if (e.key === 'Escape' && isEditing) {
                div.innerHTML = originalContent;
                isEditing = false;
            }
        });
    </script>
</body>
</html>
