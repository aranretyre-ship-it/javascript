<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактируемая таблица</title>
    <style>
        table {
            border-collapse: collapse;
            margin: 20px;
        }
        td {
            border: 1px solid #ccc;
            padding: 10px;
            min-width: 100px;
            cursor: pointer;
        }
        .editing {
            background-color: #ffffcc;
            padding: 0;
        }
        textarea {
            width: 100%;
            margin: 0;
            padding: 8px;
            resize: none;
            box-sizing: border-box;
            border: none;
            display: block;
        }
        .edit-controls {
            margin-top: 5px;
            padding: 5px;
        }
        .edit-controls button {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <table id="editableTable">
        <tr>
            <td>Ячейка 1</td>
            <td>Ячейка 2</td>
            <td>Ячейка 3</td>
        </tr>
        <tr>
            <td>Ячейка 4</td>
            <td>Ячейка 5</td>
            <td>Ячейка 6</td>
        </tr>
    </table>

    <script>
        'use strict';

        const table = document.getElementById('editableTable');
        const cells = table.querySelectorAll('td'); // Получаем все ячейки
        let editingCell = null;

        // =========================================================================
        // 1. ЗАГРУЗКА: При запуске проверяем sessionStorage для каждой ячейки
        // =========================================================================
        cells.forEach((cell, index) => {
            const savedData = sessionStorage.getItem('cell_' + index);
            if (savedData !== null) {
                cell.innerHTML = savedData;
            }
        });

        function startEdit(cell) {
            if (editingCell) return;

            editingCell = cell;
            const originalHTML = cell.innerHTML;

            const textarea = document.createElement('textarea');
            textarea.value = originalHTML;
            textarea.style.height = cell.offsetHeight + 'px';

            const okBtn = document.createElement('button');
            okBtn.textContent = 'OK';
            
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'ОТМЕНА';

            const controls = document.createElement('div');
            controls.className = 'edit-controls';
            controls.appendChild(okBtn);
            controls.appendChild(cancelBtn);

            cell.innerHTML = '';
            cell.appendChild(textarea);
            cell.appendChild(controls);
            cell.classList.add('editing');
            textarea.focus();

            // Кнопка ОК
            okBtn.onclick = function() {
                const newValue = textarea.value;
                finishEdit(cell, newValue);
                
                // =========================================================================
                // 2. СОХРАНЕНИЕ: Находим индекс текущей ячейки и сохраняем её текст
                // =========================================================================
                const cellIndex = Array.from(cells).indexOf(cell);
                sessionStorage.setItem('cell_' + cellIndex, newValue);
            };

            // Кнопка ОТМЕНА
            cancelBtn.onclick = function() {
                finishEdit(cell, originalHTML);
            };
        }

        function finishEdit(cell, content) {
            cell.innerHTML = content;
            cell.classList.remove('editing');
            editingCell = null;
        }

        table.addEventListener('click', function(e) {
            const cell = e.target.closest('td');
            if (!cell) return;
            if (editingCell === cell) return;
            if (editingCell !== null) return;

            startEdit(cell);
        });
    </script>
</body>
</html>
