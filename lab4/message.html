<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сообщения</title>
    <style>
        .message { padding: 10px; border: 1px solid #ccc; margin-bottom: 5px; position: relative; }
        .remove-button { position: absolute; right: 5px; top: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Задание 5: Список сообщений</h1>
    <div class="message">Первое сообщение для проверки.</div>
    <div class="message">Второе сообщение, которое можно закрыть.</div>
    <div class="message">Третье сообщение.</div>

    <script>
        let messages = document.querySelectorAll('.message');

        messages.forEach(msg => {
            // Создаем кнопку через JS
            let btn = document.createElement('button');
            btn.className = 'remove-button';
            btn.textContent = '[x]';
            
            // Добавляем событие удаления
            btn.onclick = () => msg.remove();
            
            // Вставляем кнопку в блок сообщения
            msg.append(btn);
        });
    </script>
</body>
</html>
