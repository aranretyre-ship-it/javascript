<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестирование lab4.js</title>
    <link rel="stylesheet" href="https://unpkg.com">
    <script src="https://unpkg.com"></script>
    <script>
        mocha.setup('bdd');
    </script>
    <script src="https://unpkg.com"></script>
    <script>
        let assert = chai.assert;
    </script>
</head>

<body>
    <script src="lab4.js"></script>
    
    <script>
        'use strict';
        
        // === Тесты для класса Book ===
        describe("Book", function () {
            let book;
            beforeEach(function () {
                book = new Book("Title", "Author", 2020, 1000);
            });
            it("должен создать книгу с заголовком, автором, годом публикации и ценой", function () {
                assert.strictEqual(book.title, "Title");
                assert.strictEqual(book.author, "Author");
                assert.strictEqual(book.pubYear, 2020);
                assert.strictEqual(book.price, 1000);
            });
            it("должен вывести заголовок, автора и цену книги через show()", function () {
                let originalConsoleLog = console.log;
                let logOutput = "";
                console.log = function (msg) {
                    logOutput = msg;
                };
                book.show();
                console.log = originalConsoleLog;
                
                assert.strictEqual(logOutput, "Title (Author): $1000");
            });
            it("изменение заголовка через сеттер", function () {
                book.title = "New Title";
                assert.strictEqual(book.title, "New Title");
            });
            it("ошибка при попытке установить пустой заголовок", function () {
                assert.throws(() => { book.title = ""; }, Error);
            });
            it("изменение года публикации через сеттер", function () {
                book.pubYear = 2021;
                assert.strictEqual(book.pubYear, 2021);
            });
            it("ошибка при попытке установить отрицательный год публикации", function () {
                assert.throws(() => { book.pubYear = -2021; }, Error);
            });
            it("изменение цены через сеттер", function () {
                book.price = 2000;
                assert.strictEqual(book.price, 2000);
            });
            it("ошибка при попытке установить отрицательную цену", function () {
                assert.throws(() => { book.price = -2000; }, Error);
            });
        });

        // === Тесты для статического метода compare ===
        describe("Book.compare", function () {
            let book1, book2, book3;
            beforeEach(function () {
                book1 = new Book("Title1", "Author1", 2020, 1000);
                book2 = new Book("Title2", "Author2", 2019, 2000);
                book3 = new Book("Title3", "Author3", 2021, 3000);
            });
            it("должен сравнивать книги по году публикации", function () {
                let booksArray = [book1, book2, book3];
                booksArray.sort(Book.compare);
                assert.strictEqual(booksArray[0].pubYear, 2019);
                assert.strictEqual(booksArray[1].pubYear, 2020);
                assert.strictEqual(booksArray[2].pubYear, 2021);
            });
        });

        // === Тесты для функции isEmpty ===
        describe("isEmpty", function () {
            it("должен вернуть true для пустого объекта", function () {
                assert.isTrue(isEmpty({}));
            });
            it("должен вернуть false для объекта с Symbol", function () {
                assert.isFalse(isEmpty({ [Symbol()]: true }));
            });
            it("должен вернуть false для объекта с неперечисляемым свойством", function () {
                assert.isFalse(isEmpty(Object.defineProperty({}, 'name', { value: 'John' })));
            });
        });

        // === Тесты для методов работы со строками классов ===
        describe("addClass и removeClass", function () {
            beforeEach(function () {
                obj.className = 'open menu';
            });
            it("obj.addClass('newClass'); => 'open menu newClass'", function () {
                obj.addClass('newClass');
                assert.strictEqual(obj.className, 'open menu newClass');
            });
            it("obj.addClass('open'); => не должен дублировать существующий класс", function () {
                obj.addClass('open');
                assert.strictEqual(obj.className, 'open menu');
            });
            it("obj.removeClass('open'); => 'menu'", function () {
                obj.removeClass('open');
                assert.strictEqual(obj.className, 'menu');
            });
            it("не должен удалять класс, если его нет в списке", function () {
                obj.removeClass('newClass');
                assert.strictEqual(obj.className, 'open menu');
            });
        });

        // === Тесты для JSON ===
        describe("JSON conversion", function () {
            beforeEach(function () {
                obj.className = 'open menu';
            });
            it("должен преобразовать объект в JSON и обратно", function () {
                let json = JSON.stringify(obj, null, 2);
                let obj2 = JSON.parse(json);
                assert.strictEqual(obj2.className, obj.className);
            });
        });

        // === Тесты для функций времени и дат ===
        describe("getSecondsToday", function () {
            it("должен вернуть количество секунд с начала дня", function () {
                let now = new Date();
                let secondsToday = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
                assert.closeTo(getSecondsToday(), secondsToday, 2);
            });
        });

        describe("formatDate", function () {
            it("let date = new Date(2023, 0, 1);=> 01.01.23", function () {
                let date = new Date(2023, 0, 1);
                assert.strictEqual(formatDate(date), "01.01.23");
            });
        });
    </script>
    
    <!-- Контейнер для интерфейса Mocha -->
    <div id="mocha"></div>
    
    <script>
        mocha.run();
    </script>
</body>

</html>
