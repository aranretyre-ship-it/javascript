<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Шахматная доска</title>
    <style>
        table { border-collapse: collapse; }
        td { width: 40px; height: 40px; border: 1px solid #000; }
    </style>
</head>
<body>
    <h1>Задание 1: Шахматная доска</h1>
    <table id="board">
        <!-- Генерируем 8 строк по 8 ячеек -->
        <script>
            let table = document.getElementById('board');
            for (let i = 0; i < 8; i++) {
                let row = table.insertRow();
                for (let j = 0; j < 8; j++) {
                    let cell = row.insertCell();
                    // Сама логика раскрашивания на JS:
                    if ((i + j) % 2 === 0) {
                        cell.style.backgroundColor = '#ffce9e';
                    } else {
                        cell.style.backgroundColor = '#d18b47';
                    }
                }
            }
        </script>
    </table>
</body>
</html>
